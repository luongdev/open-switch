// Control plane for mod_open_switch.
//
// Callers (orchestrators, bots, agents) invoke these RPCs to drive
// FreeSWITCH from outside. The module exposes this service in-process so
// no extra hop is required.
//
// Idempotency: write methods are idempotent when `request_id` is
// supplied. The module's per-process LRU cache (default TTL 300s)
// returns the cached response — success OR error — for duplicate
// `(method, tenant_id, request_id)` within the window. While the original
// is in flight, retries block on an in-flight marker with a shadow
// deadline = min(gRPC deadline, idempotency_in_flight_max_wait).
// See openspec/changes/core-module-v1/specs/control-api/spec.md
// §Idempotency for the full semantics including error-cache
// behaviour, configuration knobs, and the module-restart gap.
//
// Stability: v1 is unstable until 1.0.0 ships. Breaking changes will bump
// the version path (e.g. /v2).

syntax = "proto3";

package open_switch.control.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "open_switch/events/v1/events.proto";
import "open_switch/media/v1/media.proto";

option cc_enable_arenas = true;

// ─── Service ──────────────────────────────────────────────────────────

service ControlService {
  // Originate a new call. Returns the channel UUID once the call is
  // routed (not necessarily answered).
  rpc Originate(OriginateRequest) returns (OriginateResponse);

  // Hang up a single channel by UUID with a cause code.
  rpc Hangup(HangupRequest) returns (HangupResponse);

  // Hang up many channels at once (rare; use for tenant-wide drain).
  rpc HangupMany(HangupManyRequest) returns (HangupManyResponse);

  // Bridge two existing legs by UUID.
  rpc Bridge(BridgeRequest) returns (BridgeResponse);

  // Execute a FreeSWITCH dialplan application on a channel.
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);

  // Set channel variables.
  rpc SetVariables(SetVariablesRequest) returns (SetVariablesResponse);

  // Hold / unhold a channel.
  rpc Hold(HoldRequest) returns (HoldResponse);
  rpc Unhold(UnholdRequest) returns (UnholdResponse);

  // Blind transfer a channel to a destination.
  rpc BlindTransfer(BlindTransferRequest) returns (BlindTransferResponse);

  // Attended transfer (initiate; the consultation leg is managed by the
  // caller via separate Originate + Bridge calls).
  // Full spec: openspec/changes/core-module-v1/specs/control-api/spec.md.
  // Deferred to V1.5; the slot is reserved so the eventual addition is
  // backward-compatible. See ControlService reserved tag block below.
  // rpc AttendedTransfer(AttendedTransferRequest)
  //     returns (AttendedTransferResponse);  // RESERVED — V1.5

  // Reserved RPC slots for known V1.5+ additions (Codex I-14: explicit
  // markers prevent accidental reuse during proto evolution):
  //   AttendedTransfer
  //   StartConference / EndConference
  //   SetTenantPolicy

  // Subscribe to events via gRPC server-streaming. THIS IS THE SOLE
  // EVENT TRANSPORT. The module delivers events to all active subscribers
  // from its in-memory per-tier replay rings; subscribers persist to
  // durable storage on their own side (Kafka / Redis / S3 / file / etc.).
  //
  // For Tier-1 (billing-grade) no-loss requirements, operators MUST run
  // ≥ 2 subscribers per node in HA — see event-tiers.md §"No-loss
  // reference architecture". Slow subscribers are kicked with
  // RESOURCE_EXHAUSTED when their per-subscriber send queue overflows.
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream open_switch.events.v1.EventEnvelope);

  // Health + module status.
  rpc Health(HealthRequest) returns (HealthResponse);

  // ── Media plane (W6) ─────────────────────────────────────────────────

  rpc StartTts(StartTtsRequest) returns (StartTtsResponse);
  rpc StartStt(StartSttRequest) returns (StartSttResponse);
  rpc StartVoicebot(StartVoicebotRequest) returns (StartVoicebotResponse);
  rpc StopMediaStream(StopMediaStreamRequest) returns (StopMediaStreamResponse);

  // W7 Track B: module-owned recording relay. Mono attaches a write-stream
  // tap for the post-injection caller-ear mix; stereo attaches read + write.
  rpc StartRecordingRelay(StartRecordingRelayRequest) returns (StartRecordingRelayResponse);
  rpc StopRecordingRelay(StopRecordingRelayRequest) returns (StopRecordingRelayResponse);

  // W7 Track D: logical bot facade for one or more target channels.
  rpc StartBot(StartBotRequest) returns (StartBotResponse);
  rpc StopBot(StopBotRequest) returns (StopBotResponse);
}

// ─── Common metadata ──────────────────────────────────────────────────

message RequestHeader {
  // Caller-supplied unique request id. Used for idempotency dedup and
  // distributed tracing. Recommended: UUIDv7 (time-ordered).
  string request_id = 1;

  // Tenant identifier. Module enforces ACLs scoped by this id.
  string tenant_id = 2;

  // Free-form trace context (W3C traceparent string). Propagated into
  // emitted events for distributed tracing.
  string traceparent = 3;

  // Deadline hint. The gRPC deadline already provides this; this field is
  // for caller-side context only and may be ignored by the module.
  google.protobuf.Timestamp deadline = 4;
}

message ErrorDetail {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    INVALID_ARGUMENT = 1;
    NOT_FOUND = 2;
    UNAUTHORIZED = 3;
    PERMISSION_DENIED = 4;
    RESOURCE_EXHAUSTED = 5;
    FREESWITCH_ERROR = 6; // FS call returned non-success
    INTERNAL = 7;
    UNAVAILABLE = 8; // transient; retry safe
    ALREADY_EXISTS = 9; // duplicate resource
    FAILED_PRECONDITION = 10; // channel state wrong
    DEADLINE_EXCEEDED = 11; // gRPC deadline before completion
    UNAUTHENTICATED = 12; // API key or mTLS failure
  }
  Type type = 1;
  string message = 2;

  // For FREESWITCH_ERROR: the cause string (e.g. "USER_NOT_REGISTERED").
  string fs_cause = 10;
}

// ─── Originate ────────────────────────────────────────────────────────

message OriginateRequest {
  RequestHeader header = 1;

  // Dial strings (one per endpoint). Strategy determines how they are
  // combined (failover, multiple, simultaneous).
  repeated string endpoints = 2;

  enum Strategy {
    STRATEGY_UNSPECIFIED = 0;
    SIMULTANEOUS = 1; // ',' separator — first to answer wins
    FAILOVER = 2; // '|' separator — try in order
    MULTIPLE = 3; // ':_:' separator — keep all up (rare)
  }
  Strategy strategy = 3;

  // What to do after answer. Exactly one of:
  oneof after_answer {
    // Transfer to a dialplan extension.
    DialplanTarget dialplan = 10;
    // Execute a sequence of dialplan applications inline.
    AppSequence apps = 11;
    // Bridge to an existing leg by UUID.
    string bridge_to_uuid = 12;
    // Park the call (returns immediately; caller manages next step).
    bool park = 13;
  }

  // Caller ID for the outbound leg.
  string caller_id_name = 20;
  string caller_id_number = 21;

  // Channel variables to set on the outbound channel before dial.
  map<string, string> variables = 22;

  // Originate timeout. If zero, defaults to 60s.
  google.protobuf.Duration timeout = 23;

  // If set, the originate is cancelled if this existing channel's
  // `check_id` is not active by the time the call answers. Used to abort
  // dial when the parent call (e.g. queueing customer) hangs up.
  string check_id = 24;
}

message DialplanTarget {
  string destination = 1; // extension
  string dialplan = 2; // default "XML"
  string context = 3; // default "default"
}

message AppSequence {
  repeated App apps = 1;
}

message App {
  string name = 1;
  string args = 2;
}

message OriginateResponse {
  string channel_uuid = 1;
  ErrorDetail error = 99;
}

// ─── Hangup ──────────────────────────────────────────────────────────

message HangupRequest {
  RequestHeader header = 1;
  string uuid = 2;
  // FreeSWITCH cause string, e.g. "NORMAL_CLEARING", "USER_BUSY".
  // Default: "NORMAL_CLEARING".
  string cause = 3;
  // Set these variables on the channel before hangup (e.g. for CDR
  // enrichment in on_reporting handlers).
  map<string, string> variables = 4;
}

message HangupResponse {
  ErrorDetail error = 99;
}

message HangupManyRequest {
  RequestHeader header = 1;
  repeated string uuids = 2;
  string cause = 3;
}

message HangupManyResponse {
  repeated string hungup_uuids = 1;
  ErrorDetail error = 99;
}

// ─── Bridge ──────────────────────────────────────────────────────────

message BridgeRequest {
  RequestHeader header = 1;
  string leg_a_uuid = 2;
  string leg_b_uuid = 3;
  map<string, string> variables = 4;
}

message BridgeResponse {
  string bridged_uuid = 1;
  ErrorDetail error = 99;
}

// ─── Execute / SetVariables ──────────────────────────────────────────

message ExecuteRequest {
  RequestHeader header = 1;
  string uuid = 2;
  string app = 3;
  string args = 4;
  // If true, execute asynchronously (don't block the gRPC thread).
  bool async = 5;
}

message ExecuteResponse {
  string result = 1;
  ErrorDetail error = 99;
}

message SetVariablesRequest {
  RequestHeader header = 1;
  string uuid = 2;
  map<string, string> variables = 3;
}

message SetVariablesResponse {
  ErrorDetail error = 99;
}

// ─── Hold / Unhold / Transfer ────────────────────────────────────────

message HoldRequest {
  RequestHeader header = 1;
  repeated string uuids = 2;
}
message HoldResponse {
  repeated string held_uuids = 1;
  ErrorDetail error = 99;
}

message UnholdRequest {
  RequestHeader header = 1;
  repeated string uuids = 2;
}
message UnholdResponse {
  repeated string unheld_uuids = 1;
  ErrorDetail error = 99;
}

message BlindTransferRequest {
  RequestHeader header = 1;
  string uuid = 2;
  string destination = 3;
  string dialplan = 4;
  string context = 5;
  map<string, string> variables = 6;
}
message BlindTransferResponse {
  ErrorDetail error = 99;
}

// ─── Events subscription (in-memory ring; durability via HA subscribers) ──

message SubscribeEventsRequest {
  RequestHeader header = 1;
  // Filter by tier (e.g. "TIER_1_CRITICAL"). Empty = all tiers.
  repeated string tiers = 2;
  // Filter by event name pattern. V1 supports PREFIX-WILDCARD only:
  // a trailing `*` matches any suffix (e.g. `CHANNEL_*` matches
  // `CHANNEL_HANGUP_COMPLETE`); anything else is an exact match.
  // Generic glob syntax (`*` anywhere, `?`, `[abc]` character classes)
  // is NOT supported in V1 — see the W2.5 review (Codex C-2) and
  // `specs/control-api/spec.md` §SubscribeEvents. Empty = all events.
  repeated string event_names = 3;
  // Replay from this sequence (exclusive). The module replays from
  // since_seq+1 to ring tail if still in the replay ring, then
  // continues with live tail. If since_seq+1 has been evicted, the
  // stream is rejected with RESOURCE_EXHAUSTED — the client retries
  // without since_seq and accepts the gap.
  //
  // Sequences are monotonic per (node_id, tier). Subscribers should
  // track the highest seq successfully processed per (node, tier).
  uint64 since_seq = 4;
  // Filter by emitting node identifier. Empty = events from any node
  // (relevant only if the gRPC server fronts multiple module
  // instances; in single-node deploys leave empty).
  string node_id = 5;
  // Glob patterns matched against the `Event-Subclass` header (for
  // CUSTOM events). Empty list = match all subclasses (subscription
  // is unfiltered on the subclass axis). Uses the SAME prefix-wildcard
  // semantics as `event_names`: a trailing `*` is a prefix glob
  // (e.g. `osw.audit.*` matches `osw.audit.module_loaded`); anything
  // else is an exact match. Generic glob syntax is not supported.
  //
  // The filter is applied AND-style with `event_names` and `tiers`:
  // an envelope must satisfy all set filters to be delivered. Note
  // that non-CUSTOM events have an empty subclass; if `subclass_globs`
  // is set, an event with an empty subclass matches only if `""` (or
  // an exact-empty pattern) appears in the list.
  repeated string subclass_globs = 6;
}

// ─── Media — Start/Stop ──────────────────────────────────────────────

message TtsBufferOverride {
  // 0 = use config default (tts_jitter_buffer_ms).
  // Non-zero values are clamped to [200, tts_max_jitter_buffer_ms].
  uint32 jitter_buffer_ms = 1;
  // 0 = use config default (tts_preroll_ms).
  // Non-zero values are clamped to [50, jitter_buffer_ms].
  uint32 preroll_ms = 2;
}

message StartTtsRequest {
  RequestHeader header = 1;
  string channel_uuid = 2;
  string upstream_endpoint = 3; // gRPC URL of TTS service
  uint32 sample_rate_hz = 4; // 8000 or 16000; default 16000
  string start_message = 5; // optional opening utterance
  map<string, string> variables = 10; // passed through to TTS service

  // Per-call jitter-buffer override. Either field set to 0 means
  // "use the module-level Config defaults"; non-zero values are
  // clamped to [200, tts_max_jitter_buffer_ms]. See §TtsPlayoutBuffer.
  TtsBufferOverride buffer_override = 20;
}

message StartTtsResponse {
  string stream_id = 1; // UUIDv7 minted by handler
  open_switch.media.v1.AudioCodec negotiated_codec = 2;
  uint32 negotiated_sample_rate_hz = 3;
  ErrorDetail error = 99;
}

message StartSttRequest {
  RequestHeader header = 1;
  string channel_uuid = 2;
  string upstream_endpoint = 3;
  uint32 sample_rate_hz = 4; // default 16000
  string language = 5; // BCP-47, e.g. "vi-VN"
  bool interim_results = 6;
  repeated string vocabulary_hints = 7;
  map<string, string> variables = 10;
}

message StartSttResponse {
  string stream_id = 1;
  open_switch.media.v1.AudioCodec negotiated_codec = 2;
  uint32 negotiated_sample_rate_hz = 3;
  ErrorDetail error = 99;
}

message StartVoicebotRequest {
  RequestHeader header = 1;
  string channel_uuid = 2;
  string upstream_endpoint = 3;
  uint32 sample_rate_hz = 4; // default 16000
  string start_message = 5;
  map<string, string> variables = 10;

  // Applies to the WRITE side (bot->caller); read side has no jitter
  // buffer (FS callback delivers caller mic at the channel's natural
  // ptime cadence and SendAudio just forwards).
  TtsBufferOverride buffer_override = 20;
}

message StartVoicebotResponse {
  // Voicebot is a single logical stream but produces TWO media bugs
  // internally (read tap + write replace). The stream_id identifies
  // the logical pair; StopMediaStream tears both down.
  string stream_id = 1;
  open_switch.media.v1.AudioCodec negotiated_codec = 2;
  uint32 negotiated_sample_rate_hz = 3;
  ErrorDetail error = 99;
}

message StopMediaStreamRequest {
  RequestHeader header = 1;
  string channel_uuid = 2;
  string stream_id = 3;
}

message StopMediaStreamResponse {
  bool was_active = 1; // false if stream_id wasn't found (idempotent OK)
  ErrorDetail error = 99;
}

message StartRecordingRelayRequest {
  RequestHeader header = 1;
  string channel_uuid = 2;
  string relay_endpoint = 3; // gRPC URL of recording sink
  bool stereo = 4; // true: L=caller, R=post-injection write side
  uint32 sample_rate_hz = 5; // default Config.recording_default_rate_hz
  string warn_before_inject_override = 6; // reserved for per-call policy override
}

message StartRecordingRelayResponse {
  string stream_id = 1;
  uint32 negotiated_rate_hz = 2;
  ErrorDetail error = 99;
}

message StopRecordingRelayRequest {
  RequestHeader header = 1;
  string channel_uuid = 2;
  string stream_id = 3; // empty = stop all recording relays on channel
}

message StopRecordingRelayResponse {
  uint32 streams_stopped = 1;
  ErrorDetail error = 99;
}

message StartBotRequest {
  RequestHeader header = 1;
  repeated string target_channel_uuids = 2;
  string upstream_endpoint = 3;

  enum Purpose {
    PURPOSE_UNSPECIFIED = 0;
    TTS_BROADCAST = 1;
    STT_LISTEN = 2;
    VOICEBOT_DUPLEX = 3;
    WHISPER = 4;
  }
  Purpose purpose = 4;

  repeated string write_target_channel_uuids = 5;
  uint32 sample_rate_hz = 6; // 8000 or 16000; default 16000
  string start_message = 7;
  map<string, string> variables = 8;
  TtsBufferOverride buffer_override = 20;
  uint32 drain_timeout_ms = 30;
}

message StartBotResponse {
  string bot_id = 1;
  uint32 negotiated_rate_hz = 2;
  ErrorDetail error = 99;
}

message StopBotRequest {
  RequestHeader header = 1;
  string bot_id = 2;
}

message StopBotResponse {
  bool was_active = 1;
  ErrorDetail error = 99;
}

// ─── Health ──────────────────────────────────────────────────────────

message HealthRequest {
  RequestHeader header = 1;
}
message HealthResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    DRAINING = 3;
  }
  Status status = 1;
  string module_version = 2;
  string freeswitch_version = 3;
  uint64 active_channels = 4;
  uint64 active_media_bugs = 5;
  uint64 events_emitted_total = 6;
  // Active SubscribeEvents stream count.
  uint32 subscriber_count = 7;
  // Per-tier ring fill percentage (0-100).
  uint32 tier1_ring_fill_pct = 8;
  uint32 tier2_ring_fill_pct = 9;
  uint32 tier3_ring_fill_pct = 10;
  // Total events evicted (dropped) per tier since module load.
  uint64 tier1_dropped_total = 11;
  uint64 tier2_dropped_total = 12;
  uint64 tier3_dropped_total = 13;
}
