name: Release (multi-arch buildx + push)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build + push multi-arch images
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=v1.10.12" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.builder
          platforms: linux/amd64,linux/arm64
          target: fs-builder
          push: true
          build-args: |
            UPSTREAM_TAG=${{ steps.meta.outputs.upstream_tag }}
            OSW_ENABLE_ASAN=OFF
            OSW_STRICT_WARNINGS=ON
            OSW_BUILD_TESTS=OFF
            BUILD_TYPE=Release
          tags: |
            ghcr.io/luongdev/open-switch-builder:${{ steps.meta.outputs.version }}
            ghcr.io/luongdev/open-switch-builder:latest

      - name: Build + push runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.runner
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            UPSTREAM_TAG=${{ steps.meta.outputs.upstream_tag }}
            BUILDER_TAG=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/luongdev/open-switch:${{ steps.meta.outputs.version }}
            ghcr.io/luongdev/open-switch:latest
