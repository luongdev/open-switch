name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-lint:
    name: Proto lint (buf)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          breaking: false  # enable once we have v1 baseline
          lint: true
          format: true

  build-and-asan:
    name: Build + ASAN integration (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      # The builder Dockerfile produces /dist/mod/mod_open_switch.so.
      # We build to a local image and extract artifacts for downstream
      # test steps.
      - name: Build builder image (ASAN ON)
        run: |
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg OSW_ENABLE_ASAN=ON \
            --build-arg OSW_BUILD_TESTS=ON \
            --build-arg BUILD_TYPE=Debug \
            --build-arg UPSTREAM_TAG=v1.10.12 \
            --target fs-builder \
            -f deploy/docker/Dockerfile.builder \
            --load \
            -t open-switch/builder:ci-${{ github.sha }} \
            .

      - name: Run unit tests under ASAN
        run: |
          docker run --rm \
            -e ASAN_OPTIONS=halt_on_error=1:abort_on_error=1:detect_leaks=1 \
            -e LSAN_OPTIONS=exitcode=23:print_suppressions=0 \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build --output-on-failure -L unit

      - name: Run integration tests under ASAN
        run: |
          docker run --rm \
            -e ASAN_OPTIONS=halt_on_error=1:abort_on_error=1:detect_leaks=1 \
            -e LSAN_OPTIONS=exitcode=23:print_suppressions=0 \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build --output-on-failure -L integration

      # Phase 1 Codex finding I-16: an empty integration test set would
      # trivially pass `ctest -L integration`, giving a false green. Once
      # the implementation lands, this step asserts a minimum number of
      # tests is registered. The threshold is intentionally low at first
      # and increases as the suite grows.
      #
      # NOTE: This guard is disabled during Phase 1 (src/ is empty). The
      # first implementation commit MUST enable it and pick a non-zero
      # MIN_INTEGRATION_TESTS appropriate for the landed test set.
      - name: Verify integration suite has minimum tests registered
        if: false  # TODO(impl-phase): enable when src/ lands
        env:
          MIN_INTEGRATION_TESTS: "10"
        run: |
          count=$(docker run --rm \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build -L integration -N \
            | grep -c "^  Test #" || true)
          echo "Integration tests registered: $count (minimum: $MIN_INTEGRATION_TESTS)"
          if [ "$count" -lt "$MIN_INTEGRATION_TESTS" ]; then
            echo "FAIL: integration suite below minimum gate"
            exit 1
          fi

  static-analysis:
    name: clang-format + clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run clang-format check
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            silkeh/clang:18 \
            bash -c "find src -name '*.cc' -o -name '*.h' | xargs clang-format --dry-run --Werror"
      # clang-tidy step added once src/ has real code.

  docs-lint:
    name: Spec docs lint (markdownlint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !**/LICENSE
