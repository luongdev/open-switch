name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Base image (docker.io/simplefs/open-switch-base:1.10.12-trixie) is
# public, so no registry auth is needed for the pull. pull-requests:write
# is required by bufbuild/buf-action to post format/lint diffs as PR
# comments — without it the action errors with "Resource not accessible
# by integration" even though the actual buf lint/format passes.
permissions:
  contents: read
  pull-requests: write

jobs:
  proto-lint:
    name: Proto lint (buf)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          breaking: false  # enable once we have v1 baseline
          lint: true
          format: true

  build-and-asan:
    name: Build + ASAN integration (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      # The builder Dockerfile produces /dist/mod/mod_open_switch.so.
      # FROM is docker.io/simplefs/open-switch-base:1.10.12-trixie which
      # is public + multi-arch (amd64 + arm64) + pre-bakes gRPC so this
      # step takes ~30s instead of ~14 min.
      - name: Build builder image (ASAN ON)
        run: |
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg OSW_ENABLE_ASAN=ON \
            --build-arg OSW_BUILD_TESTS=ON \
            --build-arg BUILD_TYPE=Debug \
            --build-arg BASE_TAG=1.10.12-trixie \
            --target fs-builder \
            -f deploy/docker/Dockerfile.builder \
            --load \
            -t open-switch/builder:ci-${{ github.sha }} \
            .

      - name: Run unit tests under ASAN
        run: |
          docker run --rm \
            -e ASAN_OPTIONS=halt_on_error=1:abort_on_error=1:detect_leaks=1 \
            -e LSAN_OPTIONS=exitcode=23:print_suppressions=0 \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build --output-on-failure -L unit

      - name: Run integration tests under ASAN
        run: |
          docker run --rm \
            -e ASAN_OPTIONS=halt_on_error=1:abort_on_error=1:detect_leaks=1 \
            -e LSAN_OPTIONS=exitcode=23:print_suppressions=0 \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build --output-on-failure -L integration

      # W1 Foundation lands real unit tests under `ctest -L unit`
      # (raii, observability, core, control). Run them under the same
      # ASAN+LSAN env as integration tests. The integration label
      # remains for the W5 FS-in-container suite — guarded
      # MIN_INTEGRATION_TESTS check stays disabled until W5 enables it.
      - name: Run unit tests under ASAN (raii + observability + core + control)
        run: |
          docker run --rm \
            -e ASAN_OPTIONS=halt_on_error=1:abort_on_error=1:detect_leaks=1:detect_stack_use_after_return=1:strict_string_checks=1:check_initialization_order=1 \
            -e LSAN_OPTIONS=exitcode=23:print_suppressions=0 \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build --output-on-failure -L unit

      # Phase 1 Codex finding I-16: an empty integration test set would
      # trivially pass `ctest -L integration`, giving a false green. The
      # check is enabled once W5 lands real integration coverage; for
      # W1-W4 it stays disabled.
      - name: Verify integration suite has minimum tests registered
        if: false  # TODO(W5): enable when FS-in-container integration suite lands
        env:
          MIN_INTEGRATION_TESTS: "10"
        run: |
          count=$(docker run --rm \
            open-switch/builder:ci-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build -L integration -N \
            | grep -c "^  Test #" || true)
          echo "Integration tests registered: $count (minimum: $MIN_INTEGRATION_TESTS)"
          if [ "$count" -lt "$MIN_INTEGRATION_TESTS" ]; then
            echo "FAIL: integration suite below minimum gate"
            exit 1
          fi

      # Verify the module exports the interface symbol with the right
      # visibility. FREESWITCH-FACTS FF-009 §"Implications": `nm -D
      # --defined-only` MUST show `mod_open_switch_module_interface` as
      # `D` (global data). If the macro expanded with hidden visibility,
      # the symbol would be `d` and FS's dlsym would fail at load.
      - name: Verify mod_open_switch interface symbol is global
        run: |
          docker run --rm \
            open-switch/builder:ci-${{ github.sha }} \
            bash -c "nm -D --defined-only /dist/mod/mod_open_switch.so \
                       | grep ' mod_open_switch_module_interface$'"

  tsan-race-check:
    name: TSAN race check (events)
    runs-on: ubuntu-24.04
    # Mutually exclusive with ASAN per the root CMakeLists guard. We
    # build a separate image with OSW_ENABLE_TSAN=ON and run the
    # race-prone unit tests (per-tier ring, broadcaster, replay).
    #
    # Gating policy (W2 closeout): TSAN runs in fail-soft mode for the
    # initial W2 land. Once the suite has shaken out on real CI runs
    # for at least one wave we flip continue-on-error to false and
    # gate strictly. The Ring + Broadcaster code was designed with
    # explicit lock-order discipline (tier ring mu → roster mu →
    # SendQueue mu) so the expectation is that TSAN passes cleanly.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (TSAN ON)
        run: |
          docker buildx build \
            --build-arg OSW_ENABLE_ASAN=OFF \
            --build-arg OSW_ENABLE_TSAN=ON \
            --build-arg OSW_BUILD_TESTS=ON \
            --build-arg BUILD_TYPE=Debug \
            --build-arg BASE_TAG=1.10.12-trixie \
            --target fs-builder \
            -f deploy/docker/Dockerfile.builder \
            --load \
            -t open-switch/builder:tsan-${{ github.sha }} \
            .

      - name: Run race-sensitive unit tests under TSAN
        run: |
          docker run --rm \
            -e TSAN_OPTIONS=halt_on_error=1:report_signal_unsafe=0 \
            open-switch/builder:tsan-${{ github.sha }} \
            ctest --test-dir /usr/src/open-switch/build --output-on-failure \
                  -R 'ring_test|broadcaster_test|subscribe_replay_test|binder_test'

  static-analysis:
    name: clang-format + clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run clang-format check
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            silkeh/clang:18 \
            bash -c "find src include tests -name '*.cc' -o -name '*.h' | \
                     xargs clang-format --dry-run --Werror"
      # clang-tidy needs the compile_commands.json that CMake produces
      # under build/ — run inside the builder container that already
      # has the build tree from the build-and-asan job. We re-use the
      # same image tag.
      - name: Set up buildx (for image extraction)
        uses: docker/setup-buildx-action@v3
      - name: Build builder image (no ASAN; tests off; for tidy artifacts only)
        run: |
          docker buildx build \
            --build-arg OSW_ENABLE_ASAN=OFF \
            --build-arg OSW_BUILD_TESTS=ON \
            --build-arg BUILD_TYPE=Debug \
            --build-arg BASE_TAG=1.10.12-trixie \
            --target fs-builder \
            -f deploy/docker/Dockerfile.builder \
            --load \
            -t open-switch/builder:ci-tidy-${{ github.sha }} \
            .
      - name: Run clang-tidy across src/
        run: |
          docker run --rm \
            open-switch/builder:ci-tidy-${{ github.sha }} \
            bash -c "cd /usr/src/open-switch && \
                     run-clang-tidy -p build \
                       -j \$(nproc) \
                       -quiet \
                       -warnings-as-errors='*' \
                       '^/usr/src/open-switch/src/(?!observability/log_default_sink\\.cc$).*\\.cc$'"
          # log_default_sink.cc and other FS-dependent TUs include
          # <switch.h>; clang-tidy on macOS hosts struggled with FS
          # macros earlier. We rely on the Linux builder image's tidy
          # which has the FS headers and gRPC available. run-clang-tidy
          # keeps the full src/ coverage but fans out over runner cores
          # instead of processing every compile_commands entry serially.

  docs-lint:
    name: Spec docs lint (markdownlint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !**/LICENSE
